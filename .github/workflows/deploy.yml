name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: ecommerce-app-fury
  ACR_NAME: ecommerceacrp1
  IMAGE_NAME: ecommerce_app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build --build-arg REACT_APP_APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.REACT_APP_APPLICATIONINSIGHTS_CONNECTION_STRING }} -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
    docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set app settings
        run: |
          az webapp config appsettings set -g ecommerce-rg -n ${{ env.AZURE_WEBAPP_NAME }} \
            --settings MONGODB_URI=${{ secrets.MONGODB_URI }} \
                          JWT_SECRET=${{ secrets.JWT_SECRET }} \
                          NODE_ENV=production


